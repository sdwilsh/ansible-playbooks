---
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

configMapGenerator:
  - files:
      - configmap/wait-for-backup.sh
    name: cnpg-backup-scripts-configmap
    options:
      annotations:
        argocd.argoproj.io/hook: PreSync
        argocd.argoproj.io/hook-delete-policy: HookSucceeded
        argocd.argoproj.io/sync-wave: "0"
resources:
  - networkpolicy.yml
  - objectstore.yml
  - rbac.yml
