---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cnpg-backup-check-role
rules:
- apiGroups:
    - ""
  resources:
    - describe backups.postgresql.cnpg.io
  verbs: 
    - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cnpg-backup-check-role-binding
subjects:
- kind: ServiceAccount
  name: cnpg-backup-check
roleRef:
  kind: Role
  name: cnpg-backup-check-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cnpg-backup-check
