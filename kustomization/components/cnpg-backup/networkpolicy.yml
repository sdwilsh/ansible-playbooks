---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backup-check-to-api-server-networkpolicy
spec:
  egress:
    - ports:
        - port: 443
      to:
        - ipBlock:
            cidr: 172.17.0.1/32
  podSelector:
    matchLabels:
      app.kubernetes.io/component: wait-for-backup
  policyTypes:
    - Egress
