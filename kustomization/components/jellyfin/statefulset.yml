---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: jellyfin-statefulset
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: jellyfin
  serviceName: jellyfin-svc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jellyfin
    spec:
      automountServiceAccountToken: false
      containers:
        - image: jellyfin/jellyfin
          name: jellyfin
          ports:
            - containerPort: 7359
              name: discovery
              protocol: UDP
            - containerPort: 8096
              name: web
            - containerPort: 1900
              name: ssdp
          resources:
            limits:
              cpu: 2000m
              memory: 8Gi
              devic.es/quicksync: 1
            requests:
              cpu: 500m
              devic.es/quicksync: 1
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - mountPath: /config
              name: jellyfin-config
            - mountPath: /cache
              name: jellyfin-cache
      priorityClassName: application
      securityContext:
        fsGroup: 65534
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
      volumes:
        - emptyDir:
            sizeLimit: 100Gi
          name: jellyfin-cache
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: jellyfin-config
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
        storageClassName: longhorn-encrypted
