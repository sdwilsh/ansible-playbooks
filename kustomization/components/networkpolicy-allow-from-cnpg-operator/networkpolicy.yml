---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-cnpg-operator-networkpolicy
spec:
  ingress:
    # Allow the operator to check things.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: cloudnative-pg
      ports:
        - port: 5432
        - port: 8000
    # This is used by both `kubectl cnpg status`, the operator, and other
    # cluster Pods.
    - from:
        - ipBlock:
            cidr: 172.16.0.0/16
      ports:
        - port: 8000 # Status Port
  podSelector:
    matchLabels:
      app.kubernetes.io/managed-by: cloudnative-pg
  policyTypes:
    - Ingress
