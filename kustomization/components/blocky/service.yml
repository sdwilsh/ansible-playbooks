---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: blocky
  name: blocky-svc
spec:
  externalTrafficPolicy: Local
  ports:
    - name: dns-tcp
      port: 53
      protocol: TCP
      targetPort: dns-tcp
    - name: dns-udp
      port: 53
      protocol: UDP
      targetPort: dns-udp
  selector:
    app.kubernetes.io/name: blocky
  type: LoadBalancer
