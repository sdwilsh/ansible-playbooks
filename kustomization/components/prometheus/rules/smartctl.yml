---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: smartctl-rules
  namespace: prometheus
spec:
  groups:
    - name: smartctl
      rules:
        - alert: smart-status-failed
          annotations:
            description: "{{ $labels.device }} on {{ $labels.node }} failed its SMART overall-health self-assessment."
          expr: smartctl_device_smart_status == 0
          for: 15m
          labels:
            severity: page
        - alert: smart-critical-warning
          annotations:
            description: "{{ $labels.device }} on {{ $labels.node }} is reporting an NVMe critical warning (bitmask {{ $value }})."
          expr: smartctl_device_critical_warning > 0
          for: 15m
          labels:
            severity: page
        - alert: smart-available-spare-low
          annotations:
            description: "{{ $labels.device }} on {{ $labels.node }} available spare ({{ $value }}%) is below its manufacturer threshold."
          expr: smartctl_device_available_spare < smartctl_device_available_spare_threshold
          for: 15m
          labels:
            severity: page
        - alert: smart-media-errors
          annotations:
            description: "{{ $labels.device }} on {{ $labels.node }} logged {{ $value }} new media error(s) in the last hour."
          expr: increase(smartctl_device_media_errors[1h]) > 0
          labels:
            severity: page
        - alert: smart-temperature-high
          annotations:
            description: "{{ $labels.device }} on {{ $labels.node }} is running at {{ $value }}°C."
          expr: smartctl_device_temperature{temperature_type="current"} > 60
          for: 15m
          labels:
            severity: warning
        - alert: smart-interface-speed-degraded
          annotations:
            description: "{{ $labels.device }} on {{ $labels.node }} is negotiating a lower link speed than its maximum."
          expr: smartctl_device_interface_speed{speed_type="current"} < ignoring(speed_type) smartctl_device_interface_speed{speed_type="max"}
          for: 15m
          labels:
            severity: warning
