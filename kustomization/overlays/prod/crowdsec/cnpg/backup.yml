---
apiVersion: postgresql.cnpg.io/v1
kind: Backup
metadata:
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "0"
  name: crowdsec-pre-update-backup
spec:
  cluster:
    name: crowdsec-pg-cluster
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
---
apiVersion: v1
kind: Pod
metadata:
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/component: wait-for-backup
  name: crowdsec-pre-update-backup-complete-check
spec:
  containers:
    - args:
        - /scripts/wait-for-backup.sh
      command:
        - bash
        - -c
      env:
        - name: BACKUP_RESOURCE
          value: crowdsec-pre-update-backup
      image: docker.io/bitnami/kubectl
      name: check
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: false
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      volumeMounts:
        - mountPath: /scripts
          name: scripts
  priorityClassName: critical-application-infra
  restartPolicy: Never
  securityContext:
    fsGroup: 65534
  serviceAccount: cnpg-backup-check
  volumes:
    - configMap:
        defaultMode: 0777
        name: cnpg-backup-scripts-configmap
      name: scripts

