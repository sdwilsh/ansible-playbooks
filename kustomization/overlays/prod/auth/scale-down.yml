---
- hosts: localhost
  gather_facts: false
  tasks:
    # Best-effort: when this runs as part of the wider cluster scale-down, traefik may
    # already be down by the time auth's turn comes up, and the argocd CLI needs it - so
    # tolerate that and keep going, since disabling sync no longer matters once traefik
    # itself is on its way down. Run standalone, argocd is still reachable and this
    # protects the manual scale-down below from being fought by auto-sync.
    - name: Disable automated sync for auth and traefik
      ansible.builtin.command:
        argv:
          - argocd
          - app
          - set
          - "{{ item }}"
          - --sync-policy=manual
      loop:
        - auth
        - traefik
      ignore_errors: true
    - name: Scale down authelia deployment
      kubernetes.core.k8s:
        context: "{{ cluster }}"
        state: present
        resource_definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: authelia-deployment
            namespace: "{{ k8s_namespace }}"
          spec:
            replicas: 0
        wait: true
    - name: Scale down authelia postgresql
      kubernetes.core.k8s:
        context: "{{ cluster }}"
        state: present
        resource_definition:
          apiVersion: postgresql.cnpg.io/v1
          kind: Cluster
          metadata:
            annotations:
              cnpg.io/hibernation: "on"
            name: "{{ (lookup('file', 'cnpg/cluster/authelia.yml') | from_yaml).metadata.name }}"
            namespace: "{{ k8s_namespace }}"
        wait: true
        wait_condition:
          type: cnpg.io/hibernation
          reason: Hibernated
          status: "True"
        wait_timeout: 300 # 5m
    - name: Scale down lldap deployment 
      kubernetes.core.k8s:
        context: "{{ cluster }}"
        state: present
        resource_definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: lldap-deployment
            namespace: "{{ k8s_namespace }}"
          spec:
            replicas: 0
        wait: true
    - name: Scale down lldap postgresql
      kubernetes.core.k8s:
        context: "{{ cluster }}"
        state: present
        resource_definition:
          apiVersion: postgresql.cnpg.io/v1
          kind: Cluster
          metadata:
            annotations:
              cnpg.io/hibernation: "on"
            name: "{{ (lookup('file', 'cnpg/cluster/lldap.yml') | from_yaml).metadata.name }}"
            namespace: "{{ k8s_namespace }}"
        wait: true
        wait_condition:
          type: cnpg.io/hibernation
          reason: Hibernated
          status: "True"
        wait_timeout: 300 # 5m
  vars:
    cluster: default
    k8s_namespace: "{{ (lookup('file', 'kustomization.yml') | from_yaml).namespace }}"
