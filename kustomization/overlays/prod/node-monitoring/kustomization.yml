---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

configMapGenerator:
  - name: alloy-config
    files:
      - configmap/journal.alloy
      - configmap/loki.alloy
      - configmap/networkpolicy.alloy
  - name: alloy-scripts-configmap
    files:
      - configmap/install_journald_conf.sh
      - configmap/logger_sidecar.py
helmCharts:
  - name: alloy
    version: 1.10.1
    repo: https://grafana.github.io/helm-charts
    releaseName: alloy
    valuesFile: alloy-values.yml
  - name: prometheus-node-exporter
    version: 4.56.1
    repo: https://prometheus-community.github.io/helm-charts
    releaseName: node-exporter
    valuesFile: node-exporter-values.yml
images:
  - name: docker.io/grafana/alloy
    newTag: v1.17.1@sha256:4f6ddc56ffdcf8a6316748fc5162972e20cb301523cac1bb4a31957df733ae9b
  - name: ghcr.io/jimmidyson/configmap-reload
    newTag: v0.15.0@sha256:b578b7599d65c0279f6e1aad201bba737b9b15e6a4f308281d9e26f765e6657f 
  - name: quay.io/prometheus/node-exporter
    newTag: v1.12.1@sha256:1b4e4438faca4dd7e001dd445d161a4a2091b0fededa84093b3a8dfeae1f1be0
namespace: node-monitoring
resources:
  - namespace.yml
  - rbac.yml
