---
alloy:
  configMap:
    create: false
    name: alloy-config
    key: /
  extraEnv:
    - name: POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP
  listenAddr: $(POD_IP)
  mounts:
    extra:
      - mountPath: /host/var/log/journal
        name: journal
        readOnly: true
      - mountPath: /tmp/nflog
        name: nflog-shared-volume
      - mountPath: /tmp/alloy
        name: tmp
  priorityClassName: application-infra
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: false
    seccompProfile:
      type: RuntimeDefault
  storagePath: /tmp/alloy

configReloader:
  enabed: true
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: false
    seccompProfile:
      type: RuntimeDefault

controller:
  dnsPolicy: ClusterFirstWithHostNet
  extraContainers:
    - name: k3s-nflog-logger-sidecar
      image: alpine:latest
      command:
        - /bin/sh
        - -c
      args:
        - |
          set -eu
          
          apk add --no-cache ca-certificates kubectl python3 tcpdump 

          KUBE_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          
          kubectl config set-cluster in-cluster \
            --server=https://kubernetes.default.svc \
            --certificate-authority=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            
          kubectl config set-credentials sidecar-user --token="$KUBE_TOKEN"
          kubectl config set-context in-cluster --cluster=in-cluster --user=sidecar-user
          kubectl config use-context in-cluster
          
          exec python3 /app/logger_sidecar.py
          
      livenessProbe:
        exec:
          command:
            - sh
            - -c
            - pgrep -f logger_sidecar.py && pgrep -x tcpdump
        initialDelaySeconds: 15
        periodSeconds: 20
        timeoutSeconds: 3
        failureThreshold: 3
        
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          add:
            - NET_ADMIN
            - NET_RAW
          drop:
            - ALL
        readOnlyRootFilesystem: false
        seccompProfile:
          type: RuntimeDefault
      volumeMounts:
        - name: nflog-shared-volume
          mountPath: /tmp/nflog
        - name: scripts
          mountPath: /app
  hostNetwork: true
  initContainers:
    - command:
        - sh
        - -c
        - /scripts/install_journald_conf.sh
      image: busybox
      name: install-journald-conf
      resources:
        limits:
          cpu: 100m
          memory: 200Mi
        requests:
          cpu: 30m
          memory: 100Mi
      securityContext:
        allowPrivilegeEscalation: true
        privileged: true
        runAsUser: 0
        runAsNonRoot: false
        readOnlyRootFilesystem: false
        seccompProfile:
          type: RuntimeDefault
      volumeMounts:
        - mountPath: /scripts
          name: scripts
        - mountPath: /host/usr/local/lib/systemd/journald.conf.d
          name: journald-conf
    - command:
        - sh
        - -c
        - mkdir -p /tmp/nflog && touch /tmp/nflog/drops.log
      image: busybox
      name: setup-nflog-log-file
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        runAsNonRoot: false
        readOnlyRootFilesystem: true
        seccompProfile:
          type: RuntimeDefault
      volumeMounts:
        - mountPath: /tmp/nflog
          name: nflog-shared-volume
  type: daemonset
  volumes:
    extra:
      - hostPath:
          path: /var/log/journal
          type: Directory
        name: journal
      - hostPath:
          path: /usr/local/lib/systemd/journald.conf.d
          type: DirectoryOrCreate
        name: journald-conf
      - emptyDir: {}
        name: nflog-shared-volume
      - configMap:
          defaultMode: 0777
          name: alloy-scripts-configmap
        name: scripts
      - emptyDir: {}
        name: tmp

crds:
  create: false

nameOverride: node-

rbac:
  create: false

service:
  enabled: false

serviceAccount:
  create: false
  name: alloy-node

serviceMonitor:
  enabled: false
