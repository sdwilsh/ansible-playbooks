---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: this-is-ignored-but-is-required
spec:
  template:
    spec:
      containers:
        - env:
            - name: ROC_ENABLE_PRE_VEGA
              value: "1"
          name: jellyfin
          resources:
            limits:
              devic.es/kfd: 1
              devic.es/render: 1
            requests:
              devic.es/kfd: 1
              devic.es/render: 1
      nodeName: worker03
      securityContext:
        supplementalGroups:
          - 44 # video
          - 109 # render
