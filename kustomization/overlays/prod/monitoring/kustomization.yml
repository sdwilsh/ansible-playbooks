---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

components:
  - ../../../components/cnpg-backup
  - ../../../components/networkpolicy-allow-from-cnpg-operator
  - ../../../components/networkpolicy-allow-from-traefik
  - ../../../components/networkpolicy-allow-to-coredns
  - ../../../components/networkpolicy-allow-to-garage
  - ../../../components/networkpolicy-allow-within-this-namespace
  - ../../../components/networkpolicy-deny-all
  - ../../../components/prometheus
configMapGenerator:
  - name: alloy-config
    files:
      - configmap/kubernetes.alloy
      - configmap/loki.alloy
helmCharts:
  - name: alloy
    version: 1.10.1
    repo: https://grafana.github.io/helm-charts
    releaseName: alloy
    valuesFile: alloy-values.yml
  - name: grafana
    version: 10.5.15
    repo: https://grafana.github.io/helm-charts
    releaseName: grafana
    valuesFile: grafana-values.yml
  - name: loki
    namespace: monitoring
    version: 7.0.0
    repo: https://grafana.github.io/helm-charts
    releaseName: loki
    valuesFile: loki-values.yml
  - name: prometheus-adapter
    version: 5.3.0
    repo: oci://ghcr.io/prometheus-community/charts
    releaseName: prometheus-adapter
    valuesFile: prometheus-adapter-values.yml
images:
  - name: docker.io/bitnami/kubectl
    newTag: latest@sha256:558420daf32bbc382e3e9af4537f4073085b336ddd47399a3b70e70087115978
  - name: postgres
    newTag: 18@sha256:4aabea78cf39b90e834caf3af7d602a18565f6fe2508705c8d01aa63245c2e20
  - name: registry.k8s.io/prometheus-adapter/prometheus-adapter
    newTag: v0.12.0@sha256:932eae60e2bcf9c4660d6442da066ef1a79b4ea7cc232c61c7303069216ca006
namespace: monitoring
patches:
  - path: patches/alertmanager/set_configuration.yml
    target:
      kind: Alertmanager
      name: alertmanager
  - path: patches/alertmanager/set_externalUrl.yml
    target:
      kind: Alertmanager
      name: alertmanager
  - path: patches/cnpg/set_backup_path.yml
    target:
      kind: ObjectStore
      name: garage-objectstore
  - path: patches/loki/set_service_type_load_balancer.yml
    target:
      kind: Service
      name: loki-distributor
  - path: patches/prometheus/set_externalUrl.yml
    target:
      kind: Prometheus
      name: prometheus
  - path: patches/prometheus-adapter/set_correct_apiVersion.yml
    target:
      kind: APIService
  - path: patches/set_traefik_networkpolicy_pods_and_ports.yml
    target:
      kind: NetworkPolicy
      name: allow-from-traefik-networkpolicy
resources:
  - namespace.yml
  - alertmanagerconfig.yml
  - cnpg/backup.yml
  - cnpg/cluster.yml
  - cnpg/podmonitor.yml
  - cnpg/scheduledbackup.yml
  - ingress.yml
  - networkpolicy/allow-from-alertmanager-to-internet.yml
  - networkpolicy/allow-from-grafana-to-internet.yml
  - networkpolicy/allow-from-prometheus.yml
  - networkpolicy/allow-to-loki.yml
