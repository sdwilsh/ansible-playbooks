---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-loki-networkpolicy
spec:
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: crowdsec
          podSelector:
            matchLabels:
              app.kubernetes.io/name: crowdsec 
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: node-monitoring
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
        - ipBlock:
            cidr: 10.11.2.0/24 # hogsflixplus (HFP) remote nodes
      ports:
        - port: 3100
  podSelector:
    matchLabels:
      app.kubernetes.io/name: loki
  policyTypes:
    - Ingress
