---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-prometheus-networkpolicy
spec:
  egress:
    - to:
        - namespaceSelector: {}
    - to:
        - ipBlock:
            cidr: 10.11.0.0/23
      ports:
        - port: 9100
          protocol: TCP
        - port: 10250
          protocol: TCP
        - port: 3903 # garage admin/metrics (hostNetwork DaemonSet)
          protocol: TCP
    - to:
        - ipBlock:
            cidr: 172.17.0.1/32 # kubernetes.default.svc (apiserver ClusterIP)
      ports:
        - port: 443
          protocol: TCP
    - to:
        - ipBlock:
            cidr: 10.11.0.101/32 # node01 (apiserver)
      ports:
        - port: 6443
          protocol: TCP
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
    - Egress
