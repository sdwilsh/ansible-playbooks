---
apiVersion: postgresql.cnpg.io/v1
kind: Backup
metadata:
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "0"
  name: immich-pre-update-backup
spec:
  cluster:
    name: immich-pg-cluster
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
---
apiVersion: v1
kind: Pod
metadata:
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-wave: "1"
  name: immich-pre-update-backup-complete-check
spec:
  containers:
    - args:
        - -c
        - '[[ $(kubectl get backups.postgresql.cnpg.io immich-pre-update-backup -o jsonpath={.status.phase}) == "complete" ]]'
      command: /bin/bash
      image: docker.io/bitnami/kubectl
      name: check
  restartPolicy: Never
  serviceAccount: cnpg-backup-check

