---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

components:
  - ../../../components/tandoor
  - ../../../components/cnpg-backup
images:
  - name: vabene1111/recipes
    newTag: 2.6.5@sha256:82cd223fdd99db4518b7412dcfe3999e6acdf91eeea4703558269f83a93478c8
namespace: tandoor
patches:
  - path: patches/tandoor/set_config_env.yml
    target:
      kind: StatefulSet
      name: tandoor-statefulset
  - path: patches/cnpg/set_backup_path.yml
    target:
      kind: ObjectStore
      name: garage-objectstore
resources:
  - namespace.yml
  - cnpg/cluster.yml
  - cnpg/podmonitor.yml
  - cnpg/scheduledbackup.yml
  - ingress.yml
