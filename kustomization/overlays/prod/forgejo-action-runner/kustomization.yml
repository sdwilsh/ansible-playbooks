---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

components:
  - ../../../components/forgejo-scaled-runner
configMapGenerator:
  - name: runner-config-configmap
    files:
      - configmap/config.yml
  - name: daemon-config-configmap
    files:
      - configmap/daemon.json
      - configmap/registries.conf
      - configmap/storage.conf
images:
  - name: code.forgejo.org/forgejo/runner
    newTag: 12.13.0@sha256:d85b420efea6f0137fe03f285b05df73e0c34cfbfc2c6a96d22cc52f38106d8c
  - name: docker.io/library/docker
    newTag: 29.6.1-dind-rootless@sha256:371962f4344295a1eb185f1c9e62064bf4503a7beb8c6e73be3405500041784b
namespace: forgejo-action-runner
openapi:
  path: openapi.yml
patches:
  - path: patches/configure-scaledjob.yml
    target:
      kind: ScaledJob
      name: forgejo-runner-scaledjob
resources:
  - namespace.yml
