---
name: Devcontainer-based CI
on:
 push:
   branches:
     - main
     - renovate/**
 pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4 
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Buildx to use docker-container
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver: docker-container

      - name: Pre-build image and run lint in dev container
        uses: devcontainers/ci@b63b30de439b47a52267f241112c5b453b673db5 # v0.3.1900000449
        with:
          cacheFrom: ghcr.io/${{ github.repository }}-devcontainer
          cacheTo: ghcr.io/${{ github.repository }}-devcontainer
          env: |
            CI=1
          imageName: ghcr.io/${{ github.repository }}-devcontainer
          push: filter
          refFilterForPush: refs/heads/main

  quick-lint:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run quick-lint
        uses: devcontainers/ci@b63b30de439b47a52267f241112c5b453b673db5 # v0.3.1900000449
        with:
          cacheFrom: ghcr.io/${{ github.repository }}-devcontainer
          env: |
            ANSIBLE_CONFIG=ansible-ci.cfg
            CI=1
          push: never
          runCmd: |
            set -euxo pipefail
            just ansible-lint
            just hadolint
            just justcheck
            just renovate-validate
            just shellcheck

  kustomize-build:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run kustomize-build
        uses: devcontainers/ci@b63b30de439b47a52267f241112c5b453b673db5 # v0.3.1900000449
        with:
          cacheFrom: ghcr.io/${{ github.repository }}-devcontainer
          env: |
            CI=1
          push: never
          runCmd: |
            set -euxo pipefail
            just kustomize-build
