---
name: Devcontainer-based CI
on:
 push:
   branches:
     - main
     - renovate/**
 pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4 
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Buildx to use docker-container
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          driver: docker-container

      - name: Pre-build image and run lint in dev container
        uses: devcontainers/ci@513af61f4de4f75d37e4438f184ba4358f0fc1ca # v0.3.1900000450
        with:
          cacheFrom: ghcr.io/${{ github.repository }}-devcontainer
          cacheTo: ghcr.io/${{ github.repository }}-devcontainer
          env: |
            CI=1
          imageName: ghcr.io/${{ github.repository }}-devcontainer
          push: filter
          refFilterForPush: refs/heads/main

  quick-lint:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run quick-lint
        uses: devcontainers/ci@513af61f4de4f75d37e4438f184ba4358f0fc1ca # v0.3.1900000450
        with:
          cacheFrom: ghcr.io/${{ github.repository }}-devcontainer
          env: |
            ANSIBLE_CONFIG=ansible-ci.cfg
            CI=1
          push: never
          runCmd: |
            set -euxo pipefail
            just ansible-lint
            just hadolint
            just justcheck
            just renovate-validate
            just shellcheck

  kustomize-build:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run kustomize-build
        uses: devcontainers/ci@513af61f4de4f75d37e4438f184ba4358f0fc1ca # v0.3.1900000450
        with:
          cacheFrom: ghcr.io/${{ github.repository }}-devcontainer
          env: |
            CI=1
          push: never
          runCmd: |
            set -euxo pipefail
            just kustomize-build
